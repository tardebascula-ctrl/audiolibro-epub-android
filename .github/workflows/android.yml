name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 python3-pip python3-setuptools python3-wheel \
            git zip unzip \
            openjdk-17-jdk \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            cmake \
            libsqlite3-dev liblzma-dev \
            wget

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade buildozer cython

      - name: Install Android cmdline-tools + accept licenses + install build-tools
        shell: bash
        run: |
          set -euxo pipefail

          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          # Descarga cmdline-tools oficial (Linux)
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip

          # Extrae en la ruta correcta: cmdline-tools/latest
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          unzip -q cmdline.zip -d "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          # OJO: el zip trae una carpeta "cmdline-tools" dentro
          # Movemos su contenido al nivel esperado
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools" ]; then
            mv "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/"* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
            rmdir "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools"
          fi

          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          # Acepta licencias
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses

          # Instala lo necesario (platform-tools, platform api 33, build-tools 34)
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;34.0.0"

          # Verifica aidl
          test -x "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/aidl" --version || true

      - name: Build APK (Buildozer) using our SDK
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          # Buildozer usará este SDK en lugar del suyo
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
        with:
          name: android-apk
          path: bin/*.apk
