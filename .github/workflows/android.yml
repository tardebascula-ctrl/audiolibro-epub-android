name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 python3-pip python3-setuptools python3-wheel \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            cmake \
            libsqlite3-dev liblzma-dev

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade buildozer cython

      - name: Prepare Buildozer SDK + install cmdline-tools + accept licenses
        shell: bash
        run: |
          set -euxo pipefail

          # Fuerza a buildozer a crear la carpeta del SDK en ~/.buildozer
          buildozer android update || true

          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDKROOT=$SDKROOT"
          mkdir -p "$SDKROOT/cmdline-tools"

          # Instala cmdline-tools (sdkmanager) en cmdline-tools/latest
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          rm -rf "$SDKROOT/cmdline-tools/latest"
          mkdir -p "$SDKROOT/cmdline-tools/latest"
          unzip -q cmdline.zip -d "$SDKROOT/cmdline-tools/latest"

          # El zip trae una carpeta "cmdline-tools" dentro; subimos su contenido
          if [ -d "$SDKROOT/cmdline-tools/latest/cmdline-tools" ]; then
            mv "$SDKROOT/cmdline-tools/latest/cmdline-tools/"* "$SDKROOT/cmdline-tools/latest/"
            rmdir "$SDKROOT/cmdline-tools/latest/cmdline-tools"
          fi

          export PATH="$SDKROOT/cmdline-tools/latest/bin:$SDKROOT/platform-tools:$PATH"

          # Aceptar licencias sin que "yes" rompa el build con pipefail
          set +o pipefail
          yes | sdkmanager --sdk_root="$SDKROOT" --licenses
          set -o pipefail
          # rc=${PIPESTATUS[1]}; if [ $rc -ne 0 ]; then exit $rc; fi

          # Instalar paquetes y quedarnos con el retorno real de sdkmanager
          yes | sdkmanager --sdk_root="$SDKROOT" \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;34.0.0"
         
          # rc=${PIPESTATUS[1]}; if [ $rc -ne 0 ]; then exit $rc; fi
          # Verifica aidl
          test -x "$SDKROOT/build-tools/34.0.0/aidl"
          "$SDKROOT/build-tools/34.0.0/aidl" --version || true

      - name: Build APK (Buildozer)
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
