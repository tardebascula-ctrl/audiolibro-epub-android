name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential autoconf automake libtool m4 gettext pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            cmake \
            libsqlite3-dev liblzma-dev

      - name: Install Python build tools (pinned)
        run: |
          python -m pip install --upgrade pip
          # Cython 0.29.x suele ser el “menos problemático” con p4a en muchos builds
          python -m pip install "cython==0.29.36" "buildozer==1.5.0"

      - name: Prepare Buildozer SDK + install cmdline-tools + accept licenses
        shell: bash
        run: |
          set -euxo pipefail

          buildozer android update || true

          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDKROOT/cmdline-tools"

          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          rm -rf "$SDKROOT/cmdline-tools/latest"
          mkdir -p "$SDKROOT/cmdline-tools/latest"
          unzip -q cmdline.zip -d "$SDKROOT/cmdline-tools/latest"

          if [ -d "$SDKROOT/cmdline-tools/latest/cmdline-tools" ]; then
            mv "$SDKROOT/cmdline-tools/latest/cmdline-tools/"* "$SDKROOT/cmdline-tools/latest/"
            rmdir "$SDKROOT/cmdline-tools/latest/cmdline-tools"
          fi

          SDKMANAGER="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          test -f "$SDKMANAGER"
          chmod +x "$SDKMANAGER" || true
          
          # ✅ Forzar Java 17 para sdkmanager
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version

          set +o pipefail
          yes | "$SDKMANAGER" --sdk_root="$SDKROOT" --licenses
          set -o pipefail

          "$SDKMANAGER" --sdk_root="$SDKROOT" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;34.0.0"

          test -x "$SDKROOT/build-tools/34.0.0/aidl"
          "$SDKROOT/build-tools/34.0.0/aidl" --lang=java --version || true

      - name: Build APK (Buildozer)
        shell: bash
        run: |
          set -euxo pipefail

          # ✅ Forzar Java 17 para Gradle/SDK tools usadas por p4a
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version

          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
